[General]
sim-time-limit = 32400s
repeat = 5

**.queueLength.result-recording-modes = +vector,+timeavg
**.queueingTime.result-recording-modes = +vector,+mean
**.busy.result-recording-modes = +vector,+timeavg

# --------------------------------
# CURRENT DMV
# --------------------------------
[Config Current]
network = DMV_Current

*.source.numJobs = 1000
*.source.interArrivalTime = exponential(60s)
*.source.jobType = intuniform(0,4)

*.classifier.dispatchField = "type"
*.classifier.numCategories = 5

*.receptionQueue.capacity = 1000
*.licenseQueue.capacity = 1000
*.vehicleQueue.capacity = 1000
*.testQueue.capacity = 1000

*.receptionist.serviceTime = exponential(45s)
*.licenseClerks[*].serviceTime = exponential(600s)
*.vehicleClerks[*].serviceTime = exponential(900s)
*.testClerks[*].serviceTime = exponential(600s)

# --------------------------------
# REVISED DMV
# --------------------------------
[Config Revised]
network = DMV_Revised

*.source.numJobs = 1000
*.source.interArrivalTime = exponential(60s)
*.source.jobType = intuniform(0,4)

*.classifier.dispatchField = "type"
*.classifier.numCategories = 5

*.receptionQueue.capacity = 1000
*.combinedQueue.capacity = 1000
*.testQueue.capacity = 1000

*.receptionist.serviceTime = exponential(45s)
*.combinedClerks[*].serviceTime = exponential(750s)
*.testClerks[*].serviceTime = exponential(600s)
